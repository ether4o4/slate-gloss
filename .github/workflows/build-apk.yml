name: Build Vista Launcher APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release

env:
  NODE_VERSION: '18'
  JAVA_VERSION: '17'
  GRADLE_OPTS: '-Dorg.gradle.configuration-cache=false'

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: ${{ env.JAVA_VERSION }}

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Cache Gradle
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Install dependencies
      run: npm ci --legacy-peer-deps

    - name: Make gradlew executable
      run: chmod +x android/gradlew

    - name: Decode keystore (release only)
      if: github.event.inputs.build_type == 'release' || github.ref == 'refs/heads/main'
      env:
        ENCODED_KEYSTORE: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
      run: |
        if [ -n "$ENCODED_KEYSTORE" ]; then
          echo $ENCODED_KEYSTORE | base64 -d > android/app/release.keystore
        else
          echo "No release keystore found, will use debug"
        fi

    - name: Build Debug APK
      if: github.event.inputs.build_type == 'debug' || github.event_name == 'pull_request'
      run: |
        cd android
        ./gradlew assembleDebug --no-configuration-cache

    - name: Build Release APK
      if: github.event.inputs.build_type == 'release' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        cd android
        if [ -n "$KEYSTORE_PASSWORD" ]; then
          ./gradlew assembleRelease --no-configuration-cache
        else
          echo "No signing config, building debug instead"
          ./gradlew assembleDebug --no-configuration-cache
        fi

    - name: Upload Debug APK
      if: github.event.inputs.build_type == 'debug' || github.event_name == 'pull_request'
      uses: actions/upload-artifact@v4
      with:
        name: vista-launcher-debug
        path: android/app/build/outputs/apk/debug/*.apk
        retention-days: 7

    - name: Upload Release APK
      if: github.event.inputs.build_type == 'release' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
      uses: actions/upload-artifact@v4
      with:
        name: vista-launcher-release
        path: android/app/build/outputs/apk/release/*.apk
        retention-days: 30

    - name: Upload to GitHub Releases
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        files: android/app/build/outputs/apk/**/*.apk
        tag_name: v${{ github.run_number }}
        name: Vista Launcher v${{ github.run_number }}
        draft: true
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
