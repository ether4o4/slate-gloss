name: Build NeverSoft OS APK

on:
  push:
    branches: [ main, develop, 'claude/**' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'
  GRADLE_OPTS: '-Dorg.gradle.configuration-cache=false'

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: ${{ env.JAVA_VERSION }}

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Install dependencies
      run: npm install --legacy-peer-deps

    - name: Make gradlew executable
      run: chmod +x android/gradlew

    - name: Build Release APK (standalone — JS bundled in)
      run: |
        cd android
        ./gradlew assembleRelease --no-configuration-cache

    - name: Stage APK with stable name
      run: cp android/app/build/outputs/apk/release/app-release.apk neversoft-os.apk

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: neversoft-os-apk
        path: neversoft-os.apk
        retention-days: 14

    # Publish a non-draft GitHub Release so the rolling "latest" URL always
    # resolves to the newest APK:
    #   https://github.com/<owner>/<repo>/releases/latest/download/neversoft-os.apk
    - name: Publish rolling APK release
      if: success() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      uses: softprops/action-gh-release@v2
      with:
        tag_name: build-${{ github.run_number }}
        name: NeverSoft OS (build ${{ github.run_number }})
        files: neversoft-os.apk
        draft: false
        prerelease: false
        make_latest: true
        body: |
          Automated build #${{ github.run_number }} from `${{ github.sha }}`.

          **Rolling download (always newest):**
          https://github.com/${{ github.repository }}/releases/latest/download/neversoft-os.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
